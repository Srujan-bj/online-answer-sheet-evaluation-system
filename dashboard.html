<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - Paper Evaluation</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white p-4 shadow-md">
      <h1 class="text-xl font-bold mb-6">Dashboard</h1>
      <nav class="space-y-4">
        <a href="upload.html" class="block text-gray-700 hover:text-blue-600">Papers</a>
        <a href="#" class="block text-gray-700 hover:text-blue-600">Grades</a>
        <a href="#" class="block text-gray-700 hover:text-blue-600">Profile</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-y-auto">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold">ONLINE PAPER EVALUATION</h2>
        <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded">Logout</button>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <!-- Webcam Feed -->
        <div class="bg-white p-4 shadow rounded">
          <h3 class="text-lg font-semibold mb-2">Webcam Monitoring</h3>
           <video id="video" width="320" height="240" autoplay playsinline class="w-full h-64 bg-black"></video>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
    <div id="result"></div>
        </div>

        <!-- Paper Evaluation -->
        <div class="bg-white p-4 shadow rounded">
          <h3 class="text-lg font-semibold mb-4">Select a Paper to Evaluate</h3>
          <ul class="space-y-2">
            <li class="flex justify-between items-center">
              <a href="evaluation.html?studentId=1" class="block p-2 border rounded hover:bg-blue-100">Raj</a>
              <span id="status1" class="ml-4 text-sm text-gray-600">Not Uploaded</span>
            </li>
            <li class="flex justify-between items-center">
              <a href="evaluation.html?studentId=2" class="block p-2 border rounded hover:bg-blue-100">Smith</a>
              <span id="status2" class="ml-4 text-sm text-gray-600">Not Uploaded</span>
            </li>
            <li class="flex justify-between items-center">
              <a href="evaluation.html?studentId=3" class="block p-2 border rounded hover:bg-blue-100">abhi</a>
              <span id="status3" class="ml-4 text-sm text-gray-600">Not Uploaded</span>
            </li>
          </ul>
        </div>
      </div>
    </main>
  </div>

  <script>
    // Access webcam
    const video = document.getElementById('video');
navigator.mediaDevices.getUserMedia({ video: true })
  .then(stream => { video.srcObject = stream; });
        setInterval(async () => {
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');
                const response = await fetch("http://127.0.0.1:5000/detect_emotion", {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                document.getElementById('result').innerText = data.emotion ?
                    `Emotion: ${data.emotion}` : `Error: ${data.error}`;
            }, 'image/jpeg');
        }, 1000);
    // Function to check the uploaded paper and display its status
    function checkUploadedPaper(studentId) {
      const paper = localStorage.getItem(`scannedPaper${studentId}`);
      if (paper) {
        // Navigate to paper evaluation page
        window.location.href = `paper.html?studentId=${studentId}`;
      } else {
        alert("Paper not uploaded yet.");
      }
    }

    // Check the status of each paper
    function checkEvaluationStatus() {
      const statusElements = [
        { studentId: '1', elementId: 'status1' },
        { studentId: '2', elementId: 'status2' },
        { studentId: '3', elementId: 'status3' }
      ];

      statusElements.forEach(({ studentId, elementId }) => {
        const statusElement = document.getElementById(elementId);
        const paper = localStorage.getItem(`scannedPaper${studentId}`);
        const marks = localStorage.getItem(`totalMarks${studentId}`); // Get total marks if evaluated

        if (paper) {
          const status = localStorage.getItem(`paperStatus${studentId}`);
          if (status === 'Evaluated') {
            statusElement.innerText = `Total Marks: ${marks}`;
            statusElement.classList.add('text-green-600');
          } else {
            statusElement.innerText = 'Not Evaluated';
            statusElement.classList.add('text-red-600');
          }
        } else {
          statusElement.innerText = 'Not Uploaded';
          statusElement.classList.add('text-red-600');
        }
      });
    }

    // Call the function to check the evaluation status when the page loads
    checkEvaluationStatus();

    function logout() {
      alert('Logged out successfully!');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
